name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-bundle-budget:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm --prefix frontend ci

    - name: Build frontend
      run: npm --prefix frontend run build

    - name: Enforce frontend bundle budgets
      run: node scripts/check_frontend_bundle_budget.mjs

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Build and publish v2 frontend assets
      run: |
        npm --prefix frontend ci
        npm --prefix frontend run build:publish

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install test runner
      run: |
        python -m pip install --upgrade pip
        pip install tox

    - name: Run Unit Tests
      run: tox -e unit

    - name: Install dependencies for e2e
      run: |
        pip install -r requirements.txt
        pip install -r tests/requirements.txt

    - name: Install Playwright browsers
      run: python -m playwright install chromium

    - name: Run UI Tests
      run: bash scripts/run-e2e.sh

    - name: Upload Test Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/
