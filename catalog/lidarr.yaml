id: lidarr
name: Lidarr
description: Music manager and downloader
requires: ["vpn"]
disabled_by_default: true
fields:
  - key: TZ
    label: Timezone
    default: "Europe/London"
  - key: PUID
    label: User ID (PUID)
    default: "1000"
  - key: PGID
    label: Group ID (PGID)
    default: "1000"
  - key: CONFIG_DIR
    label: Config root directory
    default: ""
    layout_default: config_root
  - key: MEDIA_DIR
    label: Media directory (Music)
    default: ""
    layout_default: library:music
  - key: DOWNLOADS_DIR
    label: Downloads directory
    default: ""
    layout_default: downloads_root
service:
  image: lscr.io/linuxserver/lidarr:latest
  container_name: lidarr
  network_mode: "service:vpn"
  environment:
    - TZ={{TZ}}
    - PUID={{PUID}}
    - PGID={{PGID}}
  volumes:
    - "{{CONFIG_DIR}}/lidarr:/config"
    - "{{MEDIA_DIR}}:/music"
    - "{{DOWNLOADS_DIR}}:/downloads"
  restart: unless-stopped
  depends_on:
    vpn:
      condition: service_healthy
seed:
  kind: arr
  api:
    port: 8686
    config_file: "{{CONFIG_DIR}}/lidarr/config.xml"
  root_folders:
    - /music
  forbid_root_under:
    - /downloads
  download_clients:
    - implementation: Transmission
      category: lidarr
      remove_completed: true
      remove_failed: true
    - implementation: Sabnzbd
      category: lidarr
      remove_completed: true
      remove_failed: true
  import_mode: move
  completed_download_handling: true
  quality_profile: HD-1080p
  naming: standard
  recycle_bin: /music/.recycle
