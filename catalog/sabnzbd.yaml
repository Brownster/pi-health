id: sabnzbd
name: SABnzbd
description: Usenet downloader
requires: ["vpn"]
disabled_by_default: false
fields:
  - key: TZ
    label: Timezone
    default: "Europe/London"
  - key: PUID
    label: User ID (PUID)
    default: "1000"
  - key: PGID
    label: Group ID (PGID)
    default: "1000"
  - key: CONFIG_DIR
    label: Config root directory
    default: ""
    layout_default: config_root
  - key: DOWNLOADS_DIR
    label: Downloads directory
    default: ""
    layout_default: downloads_root
  - key: INCOMPLETE_DIR
    label: Incomplete downloads dir
    default: ""
    layout_default: download_incomplete
service:
  image: lscr.io/linuxserver/sabnzbd:latest
  container_name: sabnzbd
  network_mode: "service:vpn"
  environment:
    - TZ={{TZ}}
    - PUID={{PUID}}
    - PGID={{PGID}}
  volumes:
    - "{{CONFIG_DIR}}/sabnzbd/config:/config"
    - "{{INCOMPLETE_DIR}}:/incomplete-downloads"
    - "{{DOWNLOADS_DIR}}:/downloads"
  restart: unless-stopped
  depends_on:
    vpn:
      condition: service_healthy
seed:
  kind: downloadclient
  implementation: Sabnzbd
  api:
    port: 8080
    config_file: "{{CONFIG_DIR}}/sabnzbd/config/sabnzbd.ini"
  downloads:
    incomplete_dir: /downloads/incomplete
    complete_dir: /downloads/complete
  categories:
    - sonarr
    - radarr
    - lidarr
    - readarr
  remove_completed: true
  remove_failed: true
