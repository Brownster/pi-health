id: sonarr
name: Sonarr
description: TV show manager and downloader
requires: ["vpn"]
disabled_by_default: false
fields:
  - key: TZ
    label: Timezone
    default: "Europe/London"
  - key: PUID
    label: User ID (PUID)
    default: "1000"
  - key: PGID
    label: Group ID (PGID)
    default: "1000"
  - key: CONFIG_DIR
    label: Config root directory
    default: ""
    layout_default: config_root
  - key: MEDIA_DIR
    label: Media directory (TV shows)
    default: ""
    layout_default: library:tv
  - key: DOWNLOADS_DIR
    label: Downloads directory
    default: ""
    layout_default: downloads_root
  - key: IPLAYER_DIR
    label: iPlayer completed directory
    default: ""
    layout_default: download_complete:get_iplayer
service:
  image: linuxserver/sonarr:latest
  container_name: sonarr
  network_mode: "service:vpn"
  environment:
    - TZ={{TZ}}
    - PUID={{PUID}}
    - PGID={{PGID}}
  volumes:
    - "{{CONFIG_DIR}}/sonarr:/config"
    - "{{MEDIA_DIR}}:/tv"
    - "{{DOWNLOADS_DIR}}:/downloads"
    - "{{IPLAYER_DIR}}:/downloads/complete/get_iplayer"
  restart: unless-stopped
  depends_on:
    vpn:
      condition: service_healthy
seed:
  kind: arr
  api:
    port: 8989
    config_file: "{{CONFIG_DIR}}/sonarr/config.xml"
  root_folders:
    - /tv
  forbid_root_under:
    - /downloads
  download_clients:
    - implementation: Transmission
      category: sonarr
      remove_completed: true
      remove_failed: true
    - implementation: Sabnzbd
      category: sonarr
      remove_completed: true
      remove_failed: true
  import_mode: move
  completed_download_handling: true
  quality_profile: HD-1080p
  naming: standard
  recycle_bin: /tv/.recycle
