id: transmission
name: Transmission
description: Lightweight torrent client
requires: ["vpn"]
disabled_by_default: false
fields:
  - key: TZ
    label: Timezone
    default: "Europe/London"
  - key: PUID
    label: User ID (PUID)
    default: "1000"
  - key: PGID
    label: Group ID (PGID)
    default: "1000"
  - key: CONFIG_DIR
    label: Config root directory
    default: ""
    layout_default: config_root
  - key: DOWNLOADS_DIR
    label: Downloads directory
    default: ""
    layout_default: downloads_root
service:
  image: linuxserver/transmission:latest
  container_name: transmission
  network_mode: "service:vpn"
  environment:
    - TZ={{TZ}}
    - PUID={{PUID}}
    - PGID={{PGID}}
  volumes:
    - "{{CONFIG_DIR}}/transmission:/config"
    - "{{DOWNLOADS_DIR}}:/downloads"
  restart: unless-stopped
  depends_on:
    vpn:
      condition: service_healthy
seed:
  kind: downloadclient
  implementation: Transmission
  api:
    port: 9091
    config_file: "{{CONFIG_DIR}}/transmission/settings.json"
  downloads:
    incomplete_dir: /downloads/incomplete
    complete_dir: /downloads/complete
  categories:
    - sonarr
    - radarr
    - lidarr
    - readarr
  remove_completed: true
  remove_failed: true
