id: radarr
name: Radarr
description: Movie manager and downloader
requires: ["vpn"]
disabled_by_default: false
fields:
  - key: TZ
    label: Timezone
    default: "Europe/London"
  - key: PUID
    label: User ID (PUID)
    default: "1000"
  - key: PGID
    label: Group ID (PGID)
    default: "1000"
  - key: CONFIG_DIR
    label: Config root directory
    default: ""
    layout_default: config_root
  - key: MEDIA_DIR
    label: Media directory (Movies)
    default: ""
    layout_default: library:movies
  - key: DOWNLOADS_DIR
    label: Downloads directory
    default: ""
    layout_default: downloads_root
service:
  image: linuxserver/radarr:latest
  container_name: radarr
  network_mode: "service:vpn"
  environment:
    - TZ={{TZ}}
    - PUID={{PUID}}
    - PGID={{PGID}}
  volumes:
    - "{{CONFIG_DIR}}/radarr:/config"
    - "{{MEDIA_DIR}}:/movies"
    - "{{DOWNLOADS_DIR}}:/downloads"
  restart: unless-stopped
  depends_on:
    vpn:
      condition: service_healthy
seed:
  kind: arr
  api:
    port: 7878
    config_file: "{{CONFIG_DIR}}/radarr/config.xml"
  root_folders:
    - /movies
  forbid_root_under:
    - /downloads
  download_clients:
    - implementation: Transmission
      category: radarr
      remove_completed: true
      remove_failed: true
    - implementation: Sabnzbd
      category: radarr
      remove_completed: true
      remove_failed: true
  import_mode: move
  completed_download_handling: true
  quality_profile: HD-1080p
  naming: standard
  recycle_bin: /movies/.recycle
