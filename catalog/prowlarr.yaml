id: prowlarr
name: Prowlarr
description: Indexer manager for Sonarr/Radarr
requires: ["vpn"]
disabled_by_default: false
fields:
  - key: TZ
    label: Timezone
    default: "Europe/London"
  - key: PUID
    label: User ID (PUID)
    default: "1000"
  - key: PGID
    label: Group ID (PGID)
    default: "1000"
  - key: CONFIG_DIR
    label: Config root directory
    default: ""
    layout_default: config_root
service:
  image: linuxserver/prowlarr:latest
  container_name: prowlarr
  network_mode: "service:vpn"
  environment:
    - TZ={{TZ}}
    - PUID={{PUID}}
    - PGID={{PGID}}
  volumes:
    - "{{CONFIG_DIR}}/prowlarr:/config"
  restart: unless-stopped
  depends_on:
    vpn:
      condition: service_healthy
seed:
  kind: indexer
  api:
    port: 9696
    config_file: "{{CONFIG_DIR}}/prowlarr/config.xml"
  applications:
    - implementation: Sonarr
      service: sonarr
      port: 8989
      config_file: "{{CONFIG_DIR}}/sonarr/config.xml"
    - implementation: Radarr
      service: radarr
      port: 7878
      config_file: "{{CONFIG_DIR}}/radarr/config.xml"
    - implementation: Lidarr
      service: lidarr
      port: 8686
      config_file: "{{CONFIG_DIR}}/lidarr/config.xml"
