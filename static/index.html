<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Health Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/foundation.css">
    <link rel="stylesheet" href="/css/index.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
    <script src="/js/nav.js"></script>
</head>
<body class="bg-gray-900 text-blue-100 font-sans min-h-screen">
    <header class="bg-gradient-to-r from-purple-900 to-blue-900 shadow-lg relative overflow-hidden">
        <div class="absolute inset-0 overflow-hidden">
            <img src="/theme-banner" alt="Dashboard" class="w-full h-full object-cover opacity-40 blur-sm" style="filter: hue-rotate(-10deg) saturate(1.15);">
        </div>
        <div class="container mx-auto px-8 py-12 relative"></div>
    </header>

    <nav id="main-nav" class="bg-purple-900 shadow-md"></nav>

    <div id="notification-area" class="fixed top-4 right-4 z-50 w-72 flex flex-col items-end"></div>

    <main class="container mx-auto p-6">
        <div class="mb-6 flex justify-between items-center">
            <div>
                <p class="text-xs uppercase tracking-wider text-gray-400">Service Overview</p>
                <h1 class="text-2xl font-semibold">Docker Web Services</h1>
                <p class="text-sm text-gray-400 mt-1">One-click access to running service UIs detected from your active containers.</p>
            </div>
            <div class="text-sm text-gray-400 font-mono">last refresh: <span id="refresh-time">--:--:--</span></div>
        </div>
        <div class="text-sm text-gray-400 mb-4" aria-live="polite">running services: <strong id="service-count">0</strong></div>
        <section class="ph-service-grid" id="service-grid" aria-label="Docker web services"></section>
    </main>

    <script type="module" src="/js/pages/index.js"></script>
</body>
</html>
