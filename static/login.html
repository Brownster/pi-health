<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Pi-Health</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/foundation.css">
    <link rel="stylesheet" href="/css/login.css">
    <script src="/js/theme.js"></script>
</head>
<body>
    <main class="ph-shell">
        <section class="ph-card" id="login-card" aria-labelledby="login-title">
            <div class="login-brand">
                <span class="login-brand-mark" aria-hidden="true">PH</span>
                <span>Pi-Health Control</span>
            </div>

            <h1 class="ph-card-title" id="login-title">Welcome back</h1>
            <p class="ph-card-subtitle">Sign in to continue managing your services, storage, and system automation.</p>

            <div class="login-banner" aria-hidden="true">
                <img src="/theme-banner" alt="">
                <div class="login-banner-copy">Secure access on this host</div>
            </div>

            <form id="login-form" class="ph-stack" novalidate>
                <div class="ph-field">
                    <label for="username" class="ph-label">Username</label>
                    <input
                        class="ph-input"
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        placeholder="Enter username"
                        required
                    >
                </div>

                <div class="ph-field">
                    <label for="password" class="ph-label">Password</label>
                    <input
                        class="ph-input"
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        placeholder="Enter password"
                        required
                    >
                </div>

                <div id="login-error" class="ph-alert" data-visible="false" role="alert" aria-live="polite"></div>

                <button id="login-button" class="ph-button" type="submit">
                    <span>Sign in</span>
                </button>
            </form>

            <p class="ph-note">Session authentication is validated server-side before route access is granted.</p>
        </section>
    </main>

    <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
