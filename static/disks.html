<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disks - Pi-Health Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/foundation.css">
    <link rel="stylesheet" href="/css/disks.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
    <script src="/js/nav.js"></script>
</head>
<body class="bg-gray-900 text-blue-100 font-sans min-h-screen">
    <header class="bg-gradient-to-r from-purple-900 to-blue-900 shadow-lg relative overflow-hidden">
        <div class="absolute inset-0 overflow-hidden">
            <img src="/theme-banner" alt="Dashboard" class="w-full h-full object-cover opacity-40 blur-sm" style="filter: hue-rotate(-10deg) saturate(1.15);">
        </div>
        <div class="container mx-auto px-8 py-12 relative">
        </div>
    </header>

    <nav id="main-nav" class="bg-purple-900 shadow-md"></nav>

    <div id="notification-area" class="fixed top-4 right-4 z-50 w-80 flex flex-col items-end"></div>

    <main class="container mx-auto p-6">
        <div id="helper-status" class="hidden mb-6 p-4 rounded-lg border">
        </div>

        <div class="mb-6 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-semibold">Disk Management</h2>
                <p class="text-gray-400 text-sm mt-1">View and manage storage devices</p>
            </div>
            <div class="flex space-x-2">
                <button id="disks-refresh-btn" class="coraline-button text-blue-100 font-bold py-2 px-4 rounded flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>

        <section class="mb-8">
            <h3 class="text-lg font-semibold mb-4">Storage Devices</h3>
            <div id="disk-list" class="space-y-4">
                <div class="text-center py-10 text-gray-400">Loading disk information...</div>
            </div>
        </section>

        <section class="mb-8 bg-gray-800 rounded-lg p-6 border border-purple-900/40">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h3 class="text-lg font-semibold">SMART Health</h3>
                    <p class="text-gray-400 text-sm">Disk health monitoring via S.M.A.R.T.</p>
                </div>
                <button id="disks-smart-refresh-btn" class="coraline-button text-blue-100 py-2 px-4 rounded text-sm flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Refresh SMART
                </button>
            </div>
            <div id="smart-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="text-gray-400 text-sm">Click "Refresh SMART" to load disk health data...</div>
            </div>
        </section>

        <section id="suggestions-section" class="hidden mb-8">
            <h3 class="text-lg font-semibold mb-4">Mount Suggestions</h3>
            <div id="suggestions-list" class="space-y-3"></div>
        </section>
    </main>

    <div id="mount-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 items-center justify-center p-4">
        <div class="bg-gray-900 w-full max-w-lg rounded-lg shadow-xl border border-purple-900 flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-purple-800">
                <h3 id="mount-title" class="text-xl font-semibold">Mount Partition</h3>
                <button id="disks-close-mount-top" class="text-gray-400 hover:text-gray-200">Close</button>
            </div>
            <div class="p-4 space-y-4">
                <div>
                    <label class="block text-sm text-gray-300 mb-1">Device</label>
                    <input id="mount-device" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white" readonly>
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-1">UUID</label>
                    <input id="mount-uuid" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white" readonly>
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-1">Mountpoint</label>
                    <input id="mount-point" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white" placeholder="/mnt/storage">
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-1">Filesystem Type</label>
                    <input id="mount-fstype" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white" readonly>
                </div>
                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="mount-fstab" checked class="rounded">
                    <label for="mount-fstab" class="text-sm text-gray-300">Add to /etc/fstab (mount on boot)</label>
                </div>
            </div>
            <div class="p-4 border-t border-purple-800 flex justify-end space-x-2">
                <button id="disks-close-mount-bottom" class="px-4 py-2 bg-gray-700 text-white rounded">Cancel</button>
                <button id="disks-submit-mount" class="coraline-button px-4 py-2 text-white rounded">Mount</button>
            </div>
        </div>
    </div>

    <div id="smart-modal" data-overlay-close class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 items-center justify-center p-4 overflow-hidden">
        <div data-modal-panel class="bg-gray-900 w-full max-w-2xl rounded-lg shadow-xl border border-purple-900 flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center p-4 border-b border-purple-800 flex-shrink-0">
                <h3 id="smart-modal-title" class="text-xl font-semibold">SMART Details</h3>
                <button id="disks-close-smart-top" class="text-gray-400 hover:text-white text-2xl font-bold leading-none">&times;</button>
            </div>
            <div class="p-4 overflow-y-auto flex-1 min-h-0">
                <div id="smart-modal-content">
                </div>
            </div>
            <div class="p-4 border-t border-purple-800 flex justify-between items-center flex-shrink-0">
                <div class="flex gap-2">
                    <button data-smart-test="short" class="coraline-button px-3 py-2 text-sm rounded text-white">Short Test</button>
                    <button data-smart-test="long" class="coraline-button px-3 py-2 text-sm rounded text-white">Long Test</button>
                </div>
                <button id="disks-close-smart-bottom" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="/js/pages/disks.js"></script>
</body>
</html>
